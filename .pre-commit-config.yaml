# Pre-commit: проверка и форматирование перед коммитом
# Установка: pip install pre-commit && pre-commit install
# Запуск вручную: pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -q
        language: system
        pass_filenames: false
